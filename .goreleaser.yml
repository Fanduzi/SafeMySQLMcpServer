version: 2

project_name: safe-mysql-mcp

builds:
  - id: server
    binary: safe-mysql-mcp
    main: ./cmd/server
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

  - id: token
    binary: mysql-mcp-token
    main: ./pkg/token
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    ids:
      - server
      - token
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .RawVersion }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "{{ .ProjectName }}_{{ .RawVersion }}_checksums.txt"

changelog:
  disable: true
