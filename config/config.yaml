# Server configuration
server:
  host: 0.0.0.0
  port: 8080
  jwt_secret: ${JWT_SECRET}

# Database cluster connections
clusters:
  dev-cluster-1:
    host: dev-mysql-1.internal.company.com
    port: 3306
    username: ${DEV_DB_USER}
    password: ${DEV_DB_PASSWORD}
    max_open_conns: 10
    max_idle_conns: 5
    conn_max_lifetime: 300s

# Database routing mapping
databases:
  user_db:
    cluster: dev-cluster-1
  order_db:
    cluster: dev-cluster-1

# Security rules (separate file)
security:
  config_file: config/security.yaml

# Audit configuration
audit:
  enabled: true
  log_file: logs/audit.log
  max_sql_length: 2000
  max_size_mb: 100
  max_backups: 10
  max_age_days: 30
  compress: true
