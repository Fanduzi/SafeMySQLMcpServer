# SafeMySQLMcpServer — Production Docker Compose
#
# Quick start:
#   1. make init          # Interactive setup, generates .env + config.yaml
#   2. make deploy        # Build and start
#
# Or manual:
#   1. cp .env.example .env && edit .env
#   2. edit config/config.yaml with your MySQL connection
#   3. docker compose up -d --build

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: safemysql-app
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required. Run 'make init' to configure.}
      CONFIG_PATH: /app/config/config.yaml
      CONFIG_POLL_INTERVAL: ${CONFIG_POLL_INTERVAL:-30s}
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
