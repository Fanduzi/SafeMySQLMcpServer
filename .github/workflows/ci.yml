name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and Unit Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        go-version: ['1.22', '1.23', '1.24']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        run: go build ./...

      - name: Run go vet
        run: go vet ./...

      - name: Run unit tests
        run: go test ./... -race -coverprofile=coverage.out -covermode=atomic -short

      - name: Upload coverage
        if: matrix.go-version == '1.24'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

      - name: Coverage summary
        if: matrix.go-version == '1.24'
        run: |
          echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          go tool cover -func=coverage.out | tail -1 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Per-package coverage" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          go tool cover -func=coverage.out | grep -E '^github.com/.*/(internal|pkg)/' | awk '{print $1, $3}' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Coverage gate
        if: matrix.go-version == '1.24'
        run: |
          echo "Checking core package coverage ≥ 50%..."
          FAIL=0
          for pkg in internal/mcp internal/database internal/server; do
            COV=$(go tool cover -func=coverage.out | grep "$pkg/" | tail -1 | awk '{print $NF}' | sed 's/%//')
            echo "  $pkg: ${COV}%"
            if [ "$(echo "$COV < 50" | bc -l)" = "1" ]; then
              echo "  ❌ FAIL: $pkg coverage ${COV}% < 50%"
              FAIL=1
            fi
          done
          if [ "$FAIL" = "1" ]; then
            echo "Coverage gate failed"
            exit 1
          fi
          echo "Coverage gate passed"

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: testdb
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -ptestpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Download dependencies
        run: go mod download

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -ptestpassword --silent 2>/dev/null; then
              echo "MySQL is ready"
              break
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done

      - name: Run integration tests
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_USER: root
          MYSQL_PASSWORD: testpassword
          MYSQL_DATABASE: testdb
        run: go test ./... -race -v -run Integration

      - name: Run all tests with MySQL
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_USER: root
          MYSQL_PASSWORD: testpassword
          MYSQL_DATABASE: testdb
        run: go test ./... -race -coverprofile=integration-coverage.out

      - name: Upload integration coverage
        uses: actions/upload-artifact@v4
        with:
          name: integration-coverage
          path: integration-coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: ./...

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: testdb
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -ptestpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Download dependencies
        run: go mod download

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -ptestpassword --silent 2>/dev/null; then
              echo "MySQL is ready"
              break
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done

      - name: Run E2E tests
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_USER: root
          MYSQL_PASSWORD: testpassword
          MYSQL_DATABASE: testdb
        run: go test -race -v -tags e2e ./tests/e2e/

  docker:
    name: Docker Build + Health Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t safe-mysql-mcp-test .

      - name: Verify health endpoint
        run: |
          # Create a minimal config pointing to localhost MySQL (sql.Open is lazy)
          cat > /tmp/test-config.yaml <<'YAML'
          server:
            host: 0.0.0.0
            port: 8080
          clusters:
            test:
              host: 127.0.0.1
              port: 3306
              username: root
              password: unused
          databases: {}
          security:
            config_file: config/security.yaml
          audit:
            enabled: false
          YAML

          docker run -d --name test-container \
            -p 18080:8080 \
            -e JWT_SECRET=test-secret-that-is-at-least-32-characters-long \
            -e CONFIG_PATH=/tmp/test-config.yaml \
            -v /tmp/test-config.yaml:/tmp/test-config.yaml:ro \
            safe-mysql-mcp-test

          for i in {1..30}; do
            if curl -sf http://localhost:18080/health 2>/dev/null; then
              echo "Health check passed"
              break
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done

          STATUS=$(curl -sf -o /dev/null -w '%{http_code}' http://localhost:18080/health)
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status $STATUS"
            docker logs test-container
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: docker rm -f test-container 2>/dev/null || true
