run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck      # 检查未处理的错误
    - gosimple      # 代码简化建议
    - govet         # Go vet 检查
    - ineffassign   # 检测无效赋值
    - staticcheck   # 静态分析
    - unused        # 未使用的代码
    - gofmt         # 格式检查
    - goimports     # import 排序
    - misspell      # 拼写检查
    - unconvert     # 不必要的类型转换
    - gocritic      # 代码风格检查
    - sqlclosecheck # SQL rows/stmt 关闭检查
    - bodyclose     # HTTP body 关闭检查
    - shadow        # 变量遮蔽检查 (替代 govet.check-shadowing)

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  gocritic:
    enabled-tags:
      - diagnostic
      - performance
      - style

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  new-from-rev: ""

output:
  formats:
    - format: colored-line-number
